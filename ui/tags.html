<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tags · CRM</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
{{topnav}}
<main class="content">

  <div class="pagebar">
    <h1>Tags</h1>
    <span class="meta">labels for contacts and companies</span>
  </div>

  <div class="card">
    <h2>Create a new tag</h2>
    <form class="inline-form" method="post" action="/tags/new"
          style="grid-template-columns: 2fr 130px 120px auto">
      <input type="hidden" name="csrf" value="{{csrf}}">
      <div><label>Name</label><input name="name" placeholder="vip" required></div>
      <div><label>Color (hex)</label><input name="color" placeholder="#c47a4a"></div>
      <div><label>Scope</label>
        <select name="scope">
          <option value="any">any</option>
          <option value="contact">contact</option>
          <option value="company">company</option>
        </select>
      </div>
      <button class="btn" type="submit">Add tag</button>
    </form>
  </div>

  <div class="card">
    <h2>Existing tags</h2>
    <p class="muted" style="font-size:11.5px; margin-top:0">
      Edit a tag's name, color, or scope inline; click Save in its row.
      Deleting a tag detaches it from every record currently using it
      (count shown). The detach is recorded in the audit log.
    </p>
    <table>
      <thead><tr><th>Tag</th><th>In use</th><th></th></tr></thead>
      <tbody>{{rows}}</tbody>
    </table>
  </div>

</main>
</body>
</html>
