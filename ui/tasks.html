<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tasks · CRM</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
{{topnav}}
<main class="content">

  <div class="pagebar">
    <h1>Tasks</h1>
    <span class="meta">{{total}} match</span>
  </div>

  <div class="task-tabs">{{tabs}}</div>

  <form class="inline-form" method="post" action="/tasks/new"
        style="grid-template-columns: 2fr 1fr 130px 120px auto">
    <input type="hidden" name="csrf" value="{{csrf}}">
    <div><label>Title</label><input name="title" required placeholder="What needs doing"></div>
    <div><label>Description</label><input name="description" placeholder="optional"></div>
    <div><label>Priority</label>
      <select name="priority">
        <option value="low">low</option>
        <option value="normal" selected>normal</option>
        <option value="high">high</option>
        <option value="urgent">urgent</option>
      </select>
    </div>
    <div><label>Due (YYYY-MM-DD)</label><input name="due_date" placeholder="2026-12-31"></div>
    <button class="btn" type="submit">Add task</button>
  </form>

  <table>
    <thead>
      <tr>
        <th></th>
        <th>Title</th>
        <th>Priority</th>
        <th>Due</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {{rows}}
    </tbody>
  </table>

</main>
</body>
</html>
