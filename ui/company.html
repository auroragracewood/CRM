<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Company · CRM</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
{{topnav}}
<main class="content">

  <div class="pagebar">
    <h1>{{name}}<span class="muted" style="font-weight:400; margin-left:8px">#{{id}}</span></h1>
  </div>

  <div class="two-col">

    <div>
      <div class="card">
        <h2>Details</h2>
        <form method="post" action="/companies/{{id}}/edit">
          <input type="hidden" name="csrf" value="{{csrf}}">
          <div class="row"><label>Name</label><input name="name" value="{{name}}"></div>
          <div class="row"><label>Domain</label><input name="domain" value="{{domain}}"></div>
          <div class="row"><label>Website</label><input name="website" value="{{website}}"></div>
          <div class="row"><label>Industry</label><input name="industry" value="{{industry}}"></div>
          <div class="row"><label>Location</label><input name="location" value="{{location}}"></div>
          <div class="row"><label>Description</label><textarea name="description">{{description}}</textarea></div>
          <div class="row"><label></label>
            <div class="actions"><button class="btn" type="submit">Save changes</button></div>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>Timeline</h2>
        <table>
          <thead><tr><th>occurred_at</th><th>type</th><th>title</th><th>body</th></tr></thead>
          <tbody>{{timeline_rows}}</tbody>
        </table>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Danger zone</h2>
        <p class="muted" style="font-size:12px; margin-top:0">Soft-deletes this company. Contacts referencing it have <code>company_id</code> set to NULL.</p>
        <form method="post" action="/companies/{{id}}/delete" onsubmit="return confirm('Delete this company?');">
          <input type="hidden" name="csrf" value="{{csrf}}">
          <button class="btn danger" type="submit">Delete company</button>
        </form>
      </div>
    </div>

  </div>

</main>
</body>
</html>
