<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dashboard · CRM</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
{{topnav}}
<main class="content content-wide">

  <div class="pagebar">
    <h1>Dashboard</h1>
    <span class="meta">what to look at first</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="num">{{contacts}}</div><div class="label">Contacts</div></div>
    <div class="stat"><div class="num">{{companies}}</div><div class="label">Companies</div></div>
    <div class="stat"><div class="num">{{open_deals}}</div><div class="label">Open deals</div></div>
    <div class="stat"><div class="num">{{open_tasks}}</div><div class="label">Open tasks</div></div>
  </div>

  <div class="reports-grid">
    {{intent_widget}}
    {{dormant_widget}}
    {{tasks_widget}}
    {{forms_widget}}
    {{deals_widget}}
    {{leads_widget}}
    {{feed_widget}}
  </div>

</main>
</body>
</html>
