<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Segment · CRM</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
{{topnav}}
<main class="content">

  <div class="pagebar">
    <h1>{{name}}<span class="muted" style="font-weight:400; margin-left:8px">#{{id}}</span></h1>
    <span class="meta">
      <span class="task-prio prio-normal">{{type}}</span>
      · slug: <code>{{slug}}</code>
      · {{member_count}} members
    </span>
  </div>

  <div class="two-col">

    <div>
      <div class="card">
        <h2>Edit segment</h2>
        <form method="post" action="/segments/{{id}}/edit">
          <input type="hidden" name="csrf" value="{{csrf}}">
          <div class="row"><label>Name</label><input name="name" value="{{name}}"></div>
          <div class="row"><label>Rules (JSON, dynamic only)</label>
            <textarea name="rules_json" rows="14" class="mono" style="font-size:12px">{{rules_json}}</textarea>
          </div>
          <div class="row"><label></label>
            <div class="actions">
              <button class="btn" type="submit">Save segment</button>
            </div>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>Members</h2>
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Added at</th></tr></thead>
          <tbody>{{rows}}</tbody>
        </table>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Actions</h2>
        <form method="post" action="/segments/{{id}}/evaluate" style="margin-bottom:8px">
          <input type="hidden" name="csrf" value="{{csrf}}">
          <button class="btn" type="submit">Re-evaluate now</button>
        </form>
        <form method="post" action="/segments/{{id}}/delete"
              onsubmit="return confirm('Delete this segment? Members are untouched, but the rule is gone.');">
          <input type="hidden" name="csrf" value="{{csrf}}">
          <button class="btn danger" type="submit">Delete segment</button>
        </form>
      </div>
    </div>

  </div>

</main>
</body>
</html>
